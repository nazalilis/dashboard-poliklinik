<div class="space-y-6">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-bold text-primary flex items-center gap-3">
            <iconify-icon icon="mdi:doctor" width="32"></iconify-icon>
            Jadwal Dokter
        </h2>
        <button onclick="tambahDokter()" class="btn btn-primary flex items-center gap-2">
            <iconify-icon icon="mdi:plus"></iconify-icon>
            Tambah Dokter
        </button>
    </div>

    <div class="tabs tabs-box">

        <input type="radio" name="my_tabs_6" class="tab" aria-label="Spesialisasi" checked="checked" />
        <div class="tab-content bg-base-100 border-base-300 p-6">

            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4">

                <? 
                    const dataFinal2 = spesialisasiDetail; // Data sudah dikelompokkan berdasarkan spesialisasi di server-side
                ?>

                <? dataFinal2.forEach((itemPoli) => { ?>

                <div class="bg-white rounded-xl shadow-md overflow-hidden">
                    <div class="p-4 flex items-center">

                        <div class="w-full">
                            <div class="uppercase px-2 rounded-md text-white bg-green-400 font-semibold">
                                <?= itemPoli.poli ?>
                            </div>

                            <? itemPoli.listDokter.forEach((d, index) => { ?>

                            <p class="mt-2 font-semibold text-gray-600">
                                <?= d.nama ?>
                            </p>
                            <? d.jadwalDetail.forEach(line => { ?>
                            <p class="mt-2 text-gray-600">
                                <?= line ?>
                            </p>

                            <? }) ?>

                            <? }) ?>

                        </div>

                    </div>
                </div>

                <? }) ?>

            </div>

        </div>

        <input type="radio" name="my_tabs_6" class="tab" aria-label="Spesialisasi Harian" />
        <div class="tab-content bg-base-100 border-base-300 p-6">

            <? 
                const dataTerstruktur = spesialisasiHarian; // Data sudah dikelompokkan berdasarkan spesialisasi di server-side
            ?>

            <div class="flex flex-col gap-2">

                <? dataTerstruktur.forEach(itemHari => { ?>

                <details class="collapse bg-base-100 border border-base-300" name="my-accordion-det-1">
                    <summary class="collapse-title font-semibold">
                        <?= itemHari.hari ?>
                    </summary>
                    <div class="collapse-content text-sm">

                        <ul class="list bg-base-100 rounded-box shadow-md">

                            <? itemHari.shifts.forEach(itemShift => { ?>

                            <li class="p-4 pb-2 text-xs opacity-60 tracking-wide">
                                <?= itemShift.namaShift ?>
                            </li>

                            <? itemShift.listJadwal.forEach((j, index) => { ?>

                            <li class="list-row">
                                <div class="font-thin opacity-30 tabular-nums">
                                    <?= (index + 1) ?>
                                </div>
                                <div class="list-col-grow">
                                    <div>
                                        Poli
                                        <?= j.poli ?>
                                        <?= j.nama ?> (
                                        <?= j.jam ?>)
                                    </div>
                                </div>
                            </li>

                            <? }) ?>

                            <? }) ?>

                        </ul>

                    </div>
                </details>

                <? }) ?>

            </div>

        </div>

        <input type="radio" name="my_tabs_6" class="tab" aria-label="Fitur Tambahan" />
        <div class="tab-content bg-base-100 border-base-300 p-6">Coming Soon!</div>
    </div>

</div>
